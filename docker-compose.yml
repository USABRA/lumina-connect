services:
  postgres:
    image: postgres:16-alpine
    container_name: lumina-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina
      POSTGRES_DB: lumina_connect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumina -d lumina_connect"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
