# Render Blueprint — Lumina Connect
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: lumina-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: lumina-db
          property: connectionString
      # Production Vercel — override in dashboard if URL changes; see RENDER_ALIGN.md
      - key: CORS_ORIGINS
        value: https://lumina-connect-eight.vercel.app
        sync: false
      - key: LANDING_BASE_URL
        value: https://lumina-connect-eight.vercel.app/p
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: API_PUBLIC_URL
        sync: false

databases:
  - name: lumina-db
    plan: free
    databaseName: lumina_connect
    user: lumina
